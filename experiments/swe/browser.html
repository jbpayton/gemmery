expression-contract.md", "actor": "librarian", "ts": 1783167821.1348417, "action": "capture_dossier", "args": {"issue": "django__django-13569"}, "reasoning": "# GROUP BY construction \u2014 each expression owns its grouping contribution via get_group_by_cols()\n\n- `SQLCompiler.get_group_by` (`django/db/models/sql/compiler.py`, ~line 128) builds the GROUP BY clause mechanically: it collects `expr.get_group_by_cols()` from the select list, having clause, and every non-ref, non-aggregate ORDER BY expression. The compiler has NO expression-specific knowledge; each expression class declares what (if anything) it contributes to grouping.\n- Canonical bug: `.annotate(Count('related')).order_by('?')` \u2014 `'?'` resolves to `Random()` (`django/db/models/functions/math.py`, ~line 144), which reached GROUP BY through the order_by walk, emitting `GROUP BY \"thing\".\"id\", RANDOM()`. RANDOM() differs per row, so every row becomes its own group and aggregates silently collapse (Count returns 1 per duplicate row instead of the group total). Correct SQL keeps RANDOM() in ORDER BY only.\n- Real fix: override `Random.get_group_by_cols()` to return `[]` \u2014 a tiny change entirely in `django/db/models/functions/math.py`. NOT an `isinstance(exp, Random)` filter inside the compiler's order_by loop (that was the issue reporter's proposed patch; it hardcodes one class at the generic consumer and would miss any other never-groupable expression).\n- General idiom: `get_group_by_cols() -> []` is the established contract for expressions whose value must not partition groups (constants/Value, Subquery-style expressions, and nondeterministic-per-row functions like Random). When wrong GROUP BY contents trace to a specific expression appearing there, fix that expression's `get_group_by_cols` override in its home module.\n- Symptom signature: aggregation results silently break into per-row groups after adding/changing an `order_by`; `print(qs.query)` shows the ordering expression duplicated into GROUP BY. Reproduces identically on all backends (shared compiler layer, not vendor hooks).\n\n## Localization lesson\nThe actual fix touched ONLY `django/db/models/functions/math.py`. The agent's 3-file localization (math.py + sql/compiler.py + expressions.py) contained the right file but was 2 files too wide \u2014 it hedged by also listing the consumer (the `get_group_by` loop) and the hook's base definition (`BaseExpression.get_group_by_cols` in expressions.py). New rule for the fix-where-state-is-produced family: when a compiler loop mechanically aggregates a per-expression hook like `get_group_by_cols`, the fix is an override of that hook on the MOST SPECIFIC offending class, in that class's home module \u2014 not the compiler loop, and not the base-class machinery in expressions.py. Corollary triage rule: a patch embedded in the issue description that special-cases a type at the consumer (isinstance check in the compiler) is a decoy \u2014 translate it to \"that type's hook reports the wrong thing\" and localize to the type's own module. This mirrors the jsonfield/sqlite-numeric-mixin discriminator: behavior contracts live on the expression class, and the compiler is a consumer.", "pre": {}, "tests": [], "consumed": [], "incited_by": null, "reversibility": "pure", "index_keys": {"precondition_shape": [], "action_type": "dossier", "domain": ["django__django-13569"], "test_ids": []}, "success": {}, "credit": {"total": 0.0, "n_events": 0, "by_source": {}}, "ref": "main"}, "0de06a4e7a663f505f42a70b4d95461144a725b4": {"sha": "0de06a4e7a663f505f42a70b4d95461144a725b4", "kind": "knowledge", "path": "knowledge/durationfield-backend-emulation.md", "actor": "librarian", "ts": 1783167513.4864392, "action": "revise_dossier", "args": {"issue": "django__django-13449"}, "reasoning": "# DurationField on backends without native intervals (SQLite, MySQL)\n\n- PostgreSQL/Oracle have native interval types; SQLite and MySQL do NOT. On those backends Django stores DurationField as microseconds in a bigint and must convert query results back to timedelta in `convert_durationfield_value` in `django/db/backends/base/operations.py`, invoked via `SQLCompiler.apply_converters` (`django/db/models/sql/compiler.py`).\n- A `decimal.InvalidOperation` / ConversionSyntax crash inside `convert_durationfield_value` is a symptom, not the bug site: it means the SQL emitted for a duration expression produced a non-numeric value on an emulated backend. The real fix lives upstream in expression compilation.\n- Duration arithmetic compilation is split across layers: expression classes in `django/db/models/expressions.py` decide how timedelta operands are wrapped, then delegate to per-backend hooks (`combine_duration_expression`, historically `date_interval_sql`) in `django/db/backends/<vendor>/operations.py`. NOTE: since the temporal-subtraction fix, the connector/internal-type detection that picks `TemporalSubtraction` / `DurationExpression` happens at resolve time in `CombinedExpression.resolve_expression`, no longer only in `as_sql`.\n\n## Localization lesson\nFor \"works on PostgreSQL but breaks on SQLite/MySQL\" expression bugs, expect the fix to span the shared expression layer PLUS each affected backend's operations file. The durations-only expression crash was fixed by touching exactly `django/db/models/expressions.py`, `django/db/backends/base/operations.py`, `django/db/backends/sqlite3/operations.py`, and `django/db/backends/mysql/operations.py` \u2014 the agent's 4-file localization matched the real fix footprint exactly. This is the counterpoint to the single-construction-point rule from the model-string-references dossier: a multi-file answer is correct when behavior is per-backend by design (base/operations.py defines the default, each vendor's operations.py overrides it). Scope check 1: this multi-file expectation applies only to backend-dependent SQL/conversion failures at query execution. Backend-agnostic resolve-time FieldErrors (e.g. \"mixed types ... set output_field\") are single-file fixes in `django/db/models/expressions.py` \u2014 see the expression-output-field-resolution dossier. Scope check 2: the multi-file rule holds only when backend dispatch goes through `django/db/backends/<vendor>/operations.py` hooks. Field types that vendor their own backend branching via `as_mysql`/`as_oracle`/`as_sqlite` methods on their lookup/transform classes \u2014 notably JSONField, where everything lives in `django/db/models/fields/json.py` \u2014 keep backend-specific bugs single-file; see the jsonfield-key-transform-lookups dossier. Now confirmed twice: `SQLiteNumericMixin`-based DecimalField casting is the same shape \u2014 its `as_sqlite` lives on the expression classes in `django/db/models/expressions.py`, so the Window+Lag CAST-placement crash on SQLite was also single-file there; see the sqlite-numeric-mixin-cast-placement dossier. Scope check 3: even when dispatch DOES go through operations.py hooks, multi-file is only right when the per-backend SQL/conversion logic itself is wrong. If the hooks are correct and the bug is a wrong VALUE computed in the shared layer and passed into them (e.g. TruncDate/TruncTime deriving tzname inline instead of calling `self.get_tzname()`), it's a single-file fix at the computation point; a bug that reproduces identically on all backends is a strong hint you're in this case \u2014 see the datetime-functions-timezone-mixin dossier.", "pre": {}, "tests": [], "consumed": ["ff56e666d3d639b4762101256c10adf275d8a88d"], "incited_by": null, "reversibility": "pure", "index_keys": {"precondition_shape": [], "action_type": "dossier", "domain": ["django__django-13449"], "test_ids": []}, "success": {}, "credit": {"total": 0.0, "n_events": 0, "by_source": {}}, "ref": "main"}, "1e9daf56f46586434287c5fe81863709fc4047e3": {"sha": "1e9daf56f46586434287c5fe81863709fc4047e3", "kind": "knowledge", "path": "knowledge/sqlite-numeric-mixin-cast-placement.md", "actor": "librarian", "ts": 1783167513.484264, "action": "capture_dossier", "args": {"issue": "django__django-13449"}, "reasoning": "# SQLiteNumericMixin + wrapper expressions (Window) \u2014 the DecimalField CAST must wrap the OUTERMOST SQL\n\n- `SQLiteNumericMixin` (top of `django/db/models/expressions.py`) gives expressions an `as_sqlite` that wraps their compiled SQL in `CAST(%s AS NUMERIC)` when `output_field` is a DecimalField (SQLite has no native decimal type; the cast is needed for correct filtering/comparison). It is mixed into `CombinedExpression`, `Func`, `Case`, etc., so EVERY Func subclass (Lag/Lead, aggregates, ...) auto-casts on SQLite without its author knowing.\n- Composition trap: a wrapper expression that embeds compiled child SQL inside a larger clause inherits the child's cast in the WRONG place. `Window.as_sql` compiles its source expression via `compiler.compile(...)`, which dispatches to the vendor method \u2014 so `Lag('amount')` over a DecimalField emits `CAST(LAG(...) AS NUMERIC)` and Window then appends the OVER clause AFTER the cast, producing invalid `CAST(LAG(...) AS NUMERIC) OVER (...)` -> `OperationalError: near \"OVER\": syntax error`. SQLite needs the cast OUTSIDE: `CAST(LAG(...) OVER (...) AS NUMERIC)`.\n- Real fix (entirely inside `django/db/models/expressions.py`): make `Window` itself subclass `SQLiteNumericMixin`, and add `Window.as_sqlite` that, for DecimalField output, copies itself, overrides the source expression's `output_field` to `FloatField()` (suppressing the INNER mixin cast), then lets the mixin apply the cast around the full window SQL. General pattern: hoist backend-specific decoration from the child to the wrapper \u2014 suppress it on the embedded expression, re-apply it at the outermost level.\n- Symptom signature: a window function (or other wrapping construct) over a DecimalField works on PostgreSQL but crashes on SQLite with a syntax error near the token that follows the inner expression (\"near \\\"OVER\\\"\"). When SQLite-only DecimalField SQL is malformed, grep expressions.py for `SQLiteNumericMixin` and check whether a wrapper is appending SQL outside a child's cast.\n\n## Localization lesson\nSingle-file fix in `django/db/models/expressions.py`; the agent's 1-file localization \u2014 including its plan to make Window subclass SQLiteNumericMixin \u2014 matched the real fix footprint exactly. Second confirmation of the jsonfield-key-transform-lookups discriminator: the backend branching for the offending SQL lives in `as_sqlite` methods on the expression classes themselves (via SQLiteNumericMixin), not in `django/db/backends/<vendor>/operations.py` hooks, so this backend-specific EXECUTION bug stays single-file. Corollary for the expression-output-field-resolution discriminator: 'executes but emits bad SQL on one backend' does not automatically mean multi-file \u2014 first locate where the vendor branching for that SQL fragment is defined, then fix there.", "pre": {}, "tests": [], "consumed": [], "incited_by": null, "reversibility": "pure", "index_keys": {"precondition_shape": [], "action_type": "dossier", "domain": ["django__django-13449"], "test_ids": []}, "success": {}, "credit": {"total": 0.0, "n_events": 0, "by_source": {}}, "ref": "main"}, "34f5badf0ee0531bf4bf7f606f40cc1cad14f36e": {"sha": "34f5badf0ee0531bf4bf7f606f40cc1cad14f36e", "kind": "knowledge", "path": "knowledge/queryset-introspection-mirrors-compiler.md", "actor": "librarian", "ts": 1783167249.2660627, "action": "capture_dossier", "args": {"issue": "django__django-13417"}, "reasoning": "# QuerySet introspection properties (`ordered`) \u2014 Python-side mirrors of compiler behavior can go stale\n\n- `QuerySet.ordered` in `django/db/models/query.py` (~line 1218) does NOT inspect generated SQL; it re-implements the compiler's ordering decision from Query state: True if `query.extra_order_by` or `query.order_by`, else True if `query.default_ordering` and `query.get_meta().ordering` (Meta.ordering). It is a duplicated predictor of what `SQLCompiler.get_order_by` will emit.\n- Intentional behavior change to know: since Django 3.1 the compiler OMITS `Meta.ordering` for GROUP BY queries \u2014 any annotated/aggregated queryset gets no ORDER BY from default ordering (deliberate, because Meta.ordering silently changed aggregation results). The `ordered` property was not updated in lockstep, so `Foo.objects.annotate(Count('pk')).ordered` returned True while the SQL had no ORDER BY. Fix: add the same condition the compiler uses \u2014 default ordering only counts when `not self.query.group_by` \u2014 inside the property itself.\n- General pattern: whenever a Python-level property/predicate answers \"what will the SQL do?\" by duplicating a compiler condition, a behavior change in the compiler silently strands the mirror. Symptom signature: introspection attribute disagrees with the actual emitted SQL (`qs.ordered` True but no ORDER BY; the SQL itself is CORRECT). When triaging, print `str(qs.query)` \u2014 if the SQL is right and only the Python-side report is wrong, the bug is in the mirror, not the compiler.\n\n## Localization lesson\nSingle-file fix in `django/db/models/query.py`; the agent's 1-file localization (patch the `ordered` property to check `query.group_by`) matched the real fix footprint exactly. This bounds the fix-where-state-is-produced rule (model-string-references / combined-query-compiler-bypass dossiers): that rule applies when the emitted SQL or results are WRONG \u2014 then fix the Query state producer, not the compiler. Here the compiler's output was correct and intentional; only the duplicated Python-side predictor was stale, so the fix belongs at the predictor, replicating the compiler's condition. Discriminator: wrong SQL/results \u2192 fix the state producer in `sql/query.py`; correct SQL but wrong introspection/metadata about it \u2192 fix the introspection property in `query.py`.", "pre": {}, "tests": [], "consumed": [], "incited_by": null, "reversibility": "pure", "index_keys": {"precondition_shape": [], "action_type": "dossier", "domain": ["django__django-13417"], "test_ids": []}, "success": {}, "credit": {"total": 0.0, "n_events": 0, "by_source": {}}, "ref": "main"}, "823cc57de93117b538f2c46ccfff41f92d3cfc4c": {"sha": "823cc57de93117b538f2c46ccfff41f92d3cfc4c", "kind": "knowledge", "path": "knowledge/queryset-vs-query-state-split.md", "actor": "librarian", "ts": 1783167075.0572634, "action": "capture_dossier", "args": {"issue": "django__django-13406"}, "reasoning": "# QuerySet vs Query state split \u2014 pickling `queryset.query` loses QuerySet-level state\n\n- Result shaping is split across two objects: `QuerySet` (`django/db/models/query.py`) holds presentation state \u2014 `_iterable_class` (ModelIterable / ValuesIterable / ValuesListIterable / NamedValuesListIterable / FlatValuesListIterable) and `_fields` \u2014 while `Query` (`django/db/models/sql/query.py`) holds SQL-building state (`values_select`, annotations, group by). `values()`/`values_list()` set BOTH: `values_select` on the Query and `_iterable_class` on the QuerySet.\n- The documented pickling workflow (pickle `queryset.query`, later assign it to a fresh `Model.objects.all()`) transplants only the Query. The fresh QuerySet keeps the default `_iterable_class = ModelIterable`, so a values()+annotate GROUP BY query is materialized as model instances built from GROUP BY columns \u2014 broken objects whose attribute access dies with `AttributeError: 'NoneType' object has no attribute 'attname'` (e.g. on `.pk` in `__repr__`). That traceback is the signature: the crash site (`base.py`/`_get_pk_val`) is nowhere near the bug.\n- Fix point: the `QuerySet.query` property SETTER in `django/db/models/query.py` \u2014 the reattachment point must re-derive dependent QuerySet state from the incoming Query: `if value.values_select: self._iterable_class = ValuesIterable`. Note the recovery is intentionally lossy: the Query alone can't distinguish values() from values_list(), so dicts win; that was acceptable in the real fix.\n- General pattern: when object A wraps object B and a public API/doc blesses transplanting B alone, A's setter for B is the single sync point \u2014 re-derive A's B-dependent state there. Don't patch Query.__reduce__/pickle machinery in `sql/query.py`, the compiler, or the iterable classes (all consumers).\n\n## Localization lesson\nSingle-file fix in `django/db/models/query.py`; the agent's 1-file localization (query property setter) matched the real fix footprint exactly. New discriminator for the fix-where-state-lives family: when the symptom is \"queryset behaves differently after its `.query` was pickled/cloned/reassigned\", ask WHICH object owns the lost state. State that lives on the QuerySet wrapper (`_iterable_class`, `_fields`) can never round-trip through `queryset.query`, so the fix belongs at the wrapper's setter that re-accepts the Query \u2014 in `query.py`, not `sql/query.py`. Also a triage rule reconfirmed: for state-dependent misbehavior, the traceback frame (model `base.py`) is the consumer of corrupted state, not the fix site; walk back to where the state should have been (re)established.", "pre": {}, "tests": [], "consumed": [], "incited_by": null, "reversibility": "pure", "index_keys": {"precondition_shape": [], "action_type": "dossier", "domain": ["django__django-13406"], "test_ids": []}, "success": {}, "credit": {"total": 0.0, "n_events": 0, "by_source": {}}, "ref": "main"}, "ef4e9de7c5681921f585582425afefc5fc3600f8": {"sha": "ef4e9de7c5681921f585582425afefc5fc3600f8", "kind": "knowledge", "path": "knowledge/field-identity-creation-counter.md", "actor": "librarian", "ts": 1783166889.8280728, "action": "capture_dossier", "args": {"issue": "django__django-13401"}, "reasoning": "# Field identity (__eq__/__hash__/__lt__) \u2014 creation_counter conflates abstract-base fields\n\n- `Field.__eq__`, `__lt__`, and `__hash__` are defined on the Field base class in `django/db/models/fields/__init__.py` (~lines 516-529) and historically compared ONLY `self.creation_counter`.\n- Gotcha: fields inherited from an abstract base model are cloned onto each concrete subclass but keep the SAME creation_counter. So `B._meta.get_field('myfield') == C._meta.get_field('myfield')` was True and the fields collided in sets/dicts \u2014 anything keyed on field identity alone (dedup sets, dict keys) silently conflates same-named fields across sibling models.\n- Fix pattern: include the bound model in identity \u2014 `__eq__` requires equal creation_counter AND same `field.model`, using `getattr(self, 'model', None)` because UNBOUND fields (not yet contributed to a class) have no `.model` attribute; `__hash__` must change in lockstep with `__eq__` (hash the tuple).\n- Ordering-stability lesson: when adding a tie-breaker to `__lt__`, keep the ORIGINAL key (creation_counter) as the primary sort key and the new key (model) secondary \u2014 ordering by model first re-ordered cases unaffected by the collision and broke an existing test. General rule: extend comparison dunders so pre-existing orderings are preserved for all previously-distinguishable pairs.\n- Symptom signature: \"same-named fields from different models compare equal / de-duplicate in a set\" \u2192 the fix lives in the Field dunders in `django/db/models/fields/__init__.py`, not in any consumer (migrations autodetector, forms, sets built by user code).\n\n## Localization lesson\nSingle-file fix in `django/db/models/fields/__init__.py`; the agent's 1-file localization matched the real fix footprint exactly. Another confirmation of the fix-at-the-definition rule: identity/comparison semantics belong on the base class where the dunders are defined, not at the many call sites that compare or hash fields. Also note: all three dunders (`__eq__`, `__hash__`, `__lt__`) must be adjusted together \u2014 Python requires eq/hash consistency, and a partial fix reintroduces the bug through the untouched dunder.", "pre": {}, "tests": [], "con null, "reversibility": "pure", "index_keys": {"precondition_shape": [], "action_type": "dossier", "domain": ["django__django-13363"], "test_ids": []}, "success": {}, "credit": {"total": 0.0, "n_events": 0, "by_source": {}}, "ref": "main"}, "438d4db1e875287877610cc9dc0d76404a3192c0": {"sha": "438d4db1e875287877610cc9dc0d76404a3192c0", "kind": "knowledge", "path": "knowledge/datetime-functions-timezone-mixin.md", "actor": "librarian", "ts": 1783166728.5407495, "action": "capture_dossier", "args": {"issue": "django__django-13363"}, "reasoning": "# Database datetime functions (Extract/Trunc) \u2014 TimezoneMixin and the tzinfo kwarg\n\n- All database datetime functions (`Extract*`, `Trunc*`, `TruncDate`, `TruncTime`, `Now`) live in ONE module: `django/db/models/functions/datetime.py`. `TruncBase` and `Extract` include `TimezoneMixin`, whose `get_tzname()` (top of file, ~line 17) is the single correct way to compute the tzname handed to the backend: `None` when `settings.USE_TZ` is off, the name of `self.tzinfo` when the caller passed one, else `timezone.get_current_timezone_name()`.\n- Gotcha: `TruncDate.as_sql` (~line 295) and `TruncTime.as_sql` (~line 308) override `as_sql` (they cast via `connection.ops.datetime_cast_date_sql`/`datetime_cast_time_sql` instead of the generic trunc path) and re-derived tzname inline as `timezone.get_current_timezone_name() if settings.USE_TZ else None` \u2014 silently discarding the accepted `tzinfo` kwarg. Fix: call `self.get_tzname()` in both.\n- Symptom signature: a constructor kwarg accepted via a mixin has NO effect \u2014 results track the global current timezone no matter what tzinfo is passed (e.g. aggregating by `TruncDate(..., tzinfo=pytz.timezone('America/New_York'))` groups by the app's timezone instead).\n- General pattern: when a mixin/base class computes derived state from instance attributes, audit subclass `as_sql` overrides for inline re-derivations that consult only global state \u2014 they silently drop instance-level configuration. Grep the module for duplicated copies of the mixin helper's fallback expression.\n\n## Localization lesson\n1-file fix in `django/db/models/functions/datetime.py`; the agent's 1-file localization matched the real fix footprint exactly. Important negative result for the backend-dispatch discriminator: tzname IS consumed via per-backend `django/db/backends/<vendor>/operations.py` hooks (`datetime_cast_date_sql`, `datetime_trunc_sql`, ...), yet the fix touched no backend file \u2014 the hooks were correct consumers of a wrongly computed value. The durationfield-backend-emulation multi-file rule applies only when the per-backend SQL/conversion logic itself is wrong; when the shared layer feeds a bad value into correct hooks, fix the computation point (fix-where-state-is-produced, again). Corroborating signal: the bug reproduced identically on every backend, which points at the shared layer, not the vendor hooks.", "pre": {}, "tests": [], "consumed": [], "incited_by": null, "reversibility": "pure", "index_keys": {"precondition_shape": [], "action_type": "dossier", "domain": ["django__django-13363"], "test_ids": []}, "success": {}, "credit": {"total": 0.0, "n_events": 0, "by_source": {}}, "ref": "main"}, "8e5c945be83f117a055ad545061b975ed733a1db": {"sha": "8e5c945be83f117a055ad545061b975ed733a1db", "kind": "knowledge", "path": "knowledge/durationfield-backend-emulation.md", "actor": "librarian", "ts": 1783166527.919206, "action": "revise_dossier", "args": {"issue": "django__django-13346"}, "reasoning": "# DurationField on backends without native intervals (SQLite, MySQL)\n\n- PostgreSQL/Oracle have native interval types; SQLite and MySQL do NOT. On those backends Django stores DurationField as microseconds in a bigint and must convert query results back to timedelta in `convert_durationfield_value` in `django/db/backends/base/operations.py`, invoked via `SQLCompiler.apply_converters` (`django/db/models/sql/compiler.py`).\n- A `decimal.InvalidOperation` / ConversionSyntax crash inside `convert_durationfield_value` is a symptom, not the bug site: it means the SQL emitted for a duration expression produced a non-numeric value on an emulated backend. The real fix lives upstream in expression compilation.\n- Duration arithmetic compilation is split across layers: expression classes in `django/db/models/expressions.py` decide how timedelta operands are wrapped, then delegate to per-backend hooks (`combine_duration_expression`, historically `date_interval_sql`) in `django/db/backends/<vendor>/operations.py`. NOTE: since the temporal-subtraction fix, the connector/internal-type detection that picks `TemporalSubtraction` / `DurationExpression` happens at resolve time in `CombinedExpression.resolve_expression`, no longer only in `as_sql`.\n\n## Localization lesson\nFor \"works on PostgreSQL but breaks on SQLite/MySQL\" expression bugs, expect the fix to span the shared expression layer PLUS each affected backend's operations file. The durations-only expression crash was fixed by touching exactly `django/db/models/expressions.py`, `django/db/backends/base/operations.py`, `django/db/backends/sqlite3/operations.py`, and `django/db/backends/mysql/operations.py` \u2014 the agent's 4-file localization matched the real fix footprint exactly. This is the counterpoint to the single-construction-point rule from the model-string-references dossier: a multi-file answer is correct when behavior is per-backend by design (base/operations.py defines the default, each vendor's operations.py overrides it). Scope check 1: this multi-file expectation applies only to backend-dependent SQL/conversion failures at query execution. Backend-agnostic resolve-time FieldErrors (e.g. \"mixed types ... set output_field\") are single-file fixes in `django/db/models/expressions.py` \u2014 see the expression-output-field-resolution dossier. Scope check 2: the multi-file rule holds only when backend dispatch goes through `django/db/backends/<vendor>/operations.py` hooks. Field types that vendor their own backend branching via `as_mysql`/`as_oracle`/`as_sqlite` methods on their lookup/transform classes \u2014 notably JSONField, where everything lives in `django/db/models/fields/json.py` \u2014 keep backend-specific bugs single-file; see the jsonfield-key-transform-lookups dossier.", "pre": {}, "tests": [], "consumed": ["4a8dc5a1b3f09a895fda4f3461c86e4a4232c68e"], "incited_by": null, "reversibility": "pure", "index_keys": {"precondition_shape": [], "action_type": "dossier", "domain": ["django__django-13346"], "test_ids": []}, "success": {}, "credit": {"total": 0.0, "n_events": 0, "by_source": {}}, "ref": "main"}, "f4a0ab3e51b808d0d29543599fc938c25417a833": {"sha": "f4a0ab3e51b808d0d29543599fc938c25417a833", "kind": "knowledge", "path": "knowledge/jsonfield-key-transform-lookups.md", "actor": "librarian", "ts": 1783166527.9171054, "action": "capture_dossier", "args": {"issue": "django__django-13346"}, "reasoning": "# JSONField key transforms \u2014 per-backend lookup wrapping lives entirely in json.py\n\n- `models.JSONField`, `KeyTransform`, and every JSON lookup/transform live in ONE module: `django/db/models/fields/json.py`. Backend differences are handled INSIDE the lookup classes via `as_mysql`/`as_oracle`/`as_sqlite`/`as_postgresql` methods and vendor checks in `process_rhs`/`resolve_expression_parameter` \u2014 NOT via `django/db/backends/<vendor>/operations.py` hooks. PostgreSQL has native jsonb operators; MySQL, Oracle, and SQLite emulate key access with JSON_EXTRACT / JSON_QUERY / JSON_VALUE, so \"works on PostgreSQL, broken on MySQL/Oracle/SQLite\" JSONField bugs live in those emulated branches.\n- On emulated backends the lhs of a key-transform comparison is a JSON-extracted value, so the RHS must be wrapped into the same representation per backend (MySQL: JSON_EXTRACT/JSON_QUOTE; Oracle: JSON_QUERY for arrays/objects, JSON_VALUE for scalars; SQLite: JSON_EXTRACT). `KeyTransformExact.process_rhs` does this. Any lookup NOT explicitly registered on `KeyTransform` falls back to the generic implementation in `django/db/models/lookups.py`, which compares RAW params against the JSON-extracted lhs \u2014 no error, just silently 0 rows.\n- Canonical example: `field__key__in=[v]` returned 0 rows while `field__key=v` matched 312, because no `KeyTransformIn` existed. Fix pattern: subclass the generic lookup (`class KeyTransformIn(lookups.In)`), apply the same per-backend RHS wrapping KeyTransformExact uses (override `resolve_expression_parameter`/`process_rhs`), and `KeyTransform.register_lookup(...)` \u2014 all inside json.py.\n- Symptom signature to recognize: a lookup on a JSONField key transform silently returns wrong/empty results on MySQL/Oracle/SQLite while `__exact` on the same key works \u2192 a KeyTransform-specific lookup class is missing (or its vendor branch is wrong) in json.py. Audit which lookups KeyTransform registers vs. which the report exercises.\n\n## Localization lesson\nThe agent's 1-file localization (`django/db/models/fields/json.py`) matched the real fix footprint exactly, even though the bug was backend-specific across three backends. This REFINES the durationfield-backend-emulation rule: multi-file (expressions.py + per-backend operations.py) is only correct when backend dispatch goes through operations.py hooks. JSONField vendors its backend branching inside its own lookup classes (`as_mysql`/`as_oracle`/`as_sqlite`), so backend-specific JSONField lookup bugs are single-file. Discriminator: find where the vendor branching for the failing SQL lives \u2014 `backends/<vendor>/operations.py` hook \u2192 expect multi-file; `as_<vendor>` methods on the lookup/expression class itself \u2192 expect single-file.", "pre": {}, "tests": [], "consumed": [], "incited_by": null, "reversibility": "pure", "index_keys": {"precondition_shape": [], "action_type": "dossier", "domain": ["django__django-13346"], "test_ids": []}, "success": {}, "credit": {"total": 0.0, "n_events": 0, "by_source": {}}, "ref": "main"}, "84d8e1c93f38a648313eedceeb474ffcee5b6232": {"sha": "84d8e1c93f38a648313eedceeb474ffcee5b6232", "kind": "knowledge", "path": "knowledge/field-deconstruction-callables.md", "actor": "librarian", "ts": 1783166280.3163776, "action": "capture_dossier", "args": {"issue": "django__django-13343"}, "reasoning": "# Field.deconstruct() and callable constructor arguments (makemigrations round-trip)\n\n- `Field.deconstruct()` must return the ORIGINAL constructor arguments so migrations round-trip. Callable parameters (e.g. `upload_to`, `storage` on FileField/ImageField) must be emitted as references to the callable, never as the evaluated value \u2014 evaluating during deconstruction breaks the documented \"varies at runtime\" contract and inlines environment-specific state into migration files.\n- The trap is eager evaluation in `__init__`: in `django/db/models/fields/files.py`, `upload_to` is kept callable on the instance (invoked per-save), so deconstruct returns it correctly for free; but a callable `storage` is evaluated into a Storage instance in `FileField.__init__`, so by deconstruct time the original callable is gone. Fix pattern: stash the original (`self._storage_callable = storage`) in `__init__` before evaluating, and have `deconstruct()` emit `getattr(self, '_storage_callable', self.storage)`.\n- General gotcha: whenever a field's `__init__` normalizes an argument (callable -> instance, name -> object), `deconstruct()` silently serializes the normalized form. For any \"makemigrations output is wrong / inlines a concrete value\" bug, first read the field's `__init__` for eager normalization of that kwarg.\n\n## Localization lesson\nDeconstruct/serialization bugs live in the field class's own module and are single-file fixes: the callable-storage bug was fixed by touching exactly `django/db/models/fields/files.py`, and the agent's 1-file localization (stash callable in `__init__`, emit it in `deconstruct`) matched the real fix footprint exactly. This is the third confirmation of the fix-where-state-is-CONSTRUCTED rule (see model-string-references dossier: `deconstruct` is the construction point of migration state; migrations autodetector/state/writer are consumers and are NOT where the fix belongs).", "pre": {}, "tests": [], "consumed": [], "incited_by": null, "reversibility": "pure", "index_keys": {"precondition_shape": [], "action_type": "dossier", "domain": ["django__django-13343"], "test_ids": []}, "success": {}, "credit": {"total": 0.0, "n_events": 0, "by_source": {}}, "ref": "main"}, "5906661e15ba3291264a901db8361920116a5bc5": {"sha": "5906661e15ba3291264a901db8361920116a5bc5", "kind": "knowledge", "path": "knowledge/combined-query-compiler-bypass.md", "actor": "librarian", "ts": 1783166105.7805088, "action": "capture_dossier", "args": {"issue": "django__django-13158"}, "reasoning": "# Combined querysets (union/intersection/difference) \u2014 compiler bypasses the outer query\n\n- `QuerySet.union()/intersection()/difference()` set `Query.combinator` and stash the component queries in `Query.combined_queries` (`django/db/models/sql/query.py`). At compile time `SQLCompiler.as_sql` branches to `get_combinator_sql` (`django/db/models/sql/compiler.py`), which builds SQL purely from `self.query.combined_queries` \u2014 the OUTER query's WHERE clause (and most other outer state) is never consulted.\n- Consequence: any Query method that mutates outer state expecting it to change results silently no-ops on combined queries unless it also recurses into `combined_queries`. Canonical example: `Query.set_empty()` (~line 1778) only added a `NothingNode` to the outer WHERE, so `QuerySet.none()` on a union returned ALL rows \u2014 dangerous in practice because `ModelMultipleChoiceField` calls `.none()` on empty form submission, so an empty submit added every object in the union. Fix: make `set_empty()` propagate to each query in `combined_queries` (and have `is_empty()` detect the NothingNode) \u2014 single file, `django/db/models/sql/query.py`.\n- Combined queries are a recurring bug surface: many QuerySet operations are restricted or subtly broken after `.union()`. When something \"has no effect after union()\", first check whether the relevant state lives on the outer Query while `get_combinator_sql` never reads it.\n\n## Localization lesson\nFor \"X silently does nothing on a combined/union queryset\" bugs, fix belongs at the Query mutation method in `django/db/models/sql/query.py` (propagate the mutation into `combined_queries`), NOT in the compiler's `get_combinator_sql`. The agent's 1-file localization (query.py, `set_empty`) matched the real fix footprint exactly. This extends the fix-where-state-is-produced rule from the model-string-references dossier: the compiler is a consumer of Query state; fix where that state is produced/mutated.", "pre": {}, "tests": [], "consumed": [], "incited_by": null, "reversibility": "pure", "index_keys": {"precondition_shape": [], "action_type": "dossier", "domain": ["django__django-13158"], "test_ids": []}, "success": {}, "credit": {"total": 0.0, "n_events": 0, "by_source": {}}, "ref": "main"}, "4a8dc5a1b3f09a895fda4f3461c86e4a4232c68e": {"sha": "4a8dc5a1b3f09a895fda4f3461c86e4a4232c68e", "kind": "knowledge", "path": "knowledge/durationfield-backend-emulation.md", "actor": "librarian", "ts": 1783165917.5231493, "action": "revise_dossier", "args": {"issue": "django__django-13128"}, "reasoning": "# DurationField on backends without native intervals (SQLite, MySQL)\n\n- PostgreSQL/Oracle have native interval types; SQLite and MySQL do NOT. On those backends Django stores DurationField as microseconds in a bigint and must convert query results back to timedelta in `convert_durationfield_value` in `django/db/backends/base/operations.py`, invoked via `SQLCompiler.apply_converters` (`django/db/models/sql/compiler.py`).\n- A `decimal.InvalidOperation` / ConversionSyntax crash inside `convert_durationfield_value` is a symptom, not the bug site: it means the SQL emitted for a duration expression produced a non-numeric value on an emulated backend. The real fix lives upstream in expression compilation.\n- Duration arithmetic compilation is split across layers: expression classes in `django/db/models/expressions.py` decide how timedelta operands are wrapped, then delegate to per-backend hooks (`combine_duration_expression`, historically `date_interval_sql`) in `django/db/backends/<vendor>/operations.py`. NOTE: since the temporal-subtraction fix, the connector/internal-type detection that picks `TemporalSubtraction` / `DurationExpression` happens at resolve time in `CombinedExpression.resolve_expression`, no longer only in `as_sql`.\n\n## Localization lesson\nFor \"works on PostgreSQL but breaks on SQLite/MySQL\" expression bugs, expect the fix to span the shared expression layer PLUS each affected backend's operations file. The durations-only expression crash was fixed by touching exactly `django/db/models/expressions.py`, `django/db/backends/base/operations.py`, `django/db/backends/sqlite3/operations.py`, and `django/db/backends/mysql/operations.py` \u2014 the agent's 4-file localization matched the real fix footprint exactly. This is the counterpoint to the single-construction-point rule from the model-string-references dossier: a multi-file answer is correct when behavior is per-backend by design (base/operations.py defines the default, each vendor's operations.py overrides it). Scope check: this multi-file expectation applies only to backend-dependent SQL/conversion failures at query execution. Backend-agnostic resolve-time FieldErrors (e.g. \"mixed types ... set output_field\") are single-file fixes in `django/db/models/expressions.py` \u2014 see the expression-output-field-resolution dossier.", "pre": {}, "tests": [], "consumed": ["33cd5fb7b3bec1b2802a161047c72549bd2ebb0a"], "incited_by": null, "reversibility": "pure", "index_keys": {"precondition_shape": [], "action_type": "dossier", "domain": ["django__django-13128"], "test_ids": []}, "success": {}, "credit": {"total": 0.0, "n_events": 0, "by_source": {}}, "ref": "main"}, "1aa559ca171ff5afc7365bc11bc73ede3db4cfb2": {"sha": "1aa559ca171ff5afc7365bc11bc73ede3db4cfb2", "kind": "knowledge", "path": "knowledge/expression-output-field-resolution.md", "actor": "librarian", "ts": 1783165917.5211277, "action": "capture_dossier", "args": {"issue": "django__django-13128"}, "reasoning": "# Combined-expression output_field inference (FieldError: mixed types)\n\n- `BaseExpression._resolve_output_field` in `django/db/models/expressions.py` infers `output_field` from source expressions and raises `FieldError: Expression contains mixed types: ... You must set output_field.` when they differ. This fires at queryset-construction/annotate (resolve) time, before any SQL exists, and is backend-agnostic.\n- Historically the datetime-minus-datetime -> `TemporalSubtraction` (DurationField output) and mixed-duration -> `DurationExpression` special-casing lived only in `CombinedExpression.as_sql` \u2014 too late to influence output_field inference, which is why `F('end') - F('start')` used to require `ExpressionWrapper`. The fix moved the connector/internal-type detection into `CombinedExpression.resolve_expression`, so the type-aware subclass is chosen before output_field resolution runs.\n- General pattern: any type/output_field decision that exists only in `as_sql` is invisible to resolve-time machinery (output_field inference, validation, converters). Fixes for such gaps mean hoisting the detection into `resolve_expression`, not patching `as_sql` or backends.\n\n## Localization lesson\nDiscriminator for expression bugs: does the error occur while BUILDING the queryset (resolve-time `FieldError`, no SQL yet) or while EXECUTING it (bad SQL / conversion crash on a specific backend)? Resolve-time type errors are single-file fixes in `django/db/models/expressions.py` \u2014 the agent's 1-file localization here matched the real fix exactly. Backend-specific execution failures are the multi-file case (expressions.py + backend operations; see durationfield-backend-emulation dossier).", "pre": {}, "tests": [], "consumed": [], "incited_by": null, "reversibility": "pure", "index_keys": {"precondition_shape": [], "action_type": "dossier", "domain": ["django__django-13128"], "test_ids": []}, "success": {}, "credit": {"total": 0.0, "n_events": 0, "by_source": {}}, "ref": "main"}, "33cd5fb7b3bec1b2802a161047c72549bd2ebb0a": {"sha": "33cd5fb7b3bec1b2802a161047c72549bd2ebb0a", "kind": "knowledge", "path": "knowledge/durationfield-backend-emulation.md", "actor": "librarian", "ts": 1783165685.021426, "action": "capture_dossier", "args": {"issue": "django__django-13121"}, "reasoning": "# DurationField on backends without native intervals (SQLite, MySQL)\n\n- PostgreSQL/Oracle have native interval types; SQLite and MySQL do NOT. On those backends Django stores DurationField as microseconds in a bigint and must convert query results back to timedelta in `convert_durationfield_value` in `django/db/backends/base/operations.py`, invoked via `SQLCompiler.apply_converters` (`django/db/models/sql/compiler.py`).\n- A `decimal.InvalidOperation` / ConversionSyntax crash inside `convert_durationfield_value` is a symptom, not the bug site: it means the SQL emitted for a duration expression produced a non-numeric value on an emulated backend. The real fix lives upstream in expression compilation.\n- Duration arithmetic compilation is split across layers: `Combinable._combine` / `DurationExpression` in `django/db/models/expressions.py` decide how timedelta operands are wrapped, then delegate to per-backend hooks (`combine_duration_expression`, historically `date_interval_sql`) in `django/db/backends/<vendor>/operations.py`.\n\n## Localization lesson\nFor \"works on PostgreSQL but breaks on SQLite/MySQL\" expression bugs, expect the fix to span the shared expression layer PLUS each affected backend's operations file. The durations-only expression crash was fixed by touching exactly `django/db/models/expressions.py`, `django/db/backends/base/operations.py`, `django/db/backends/sqlite3/operations.py`, and `django/db/backends/mysql/operations.py` \u2014 the agent's 4-file localization matched the real fix footprint exactly. This is the counterpoint to the single-construction-point rule from the model-string-references dossier: a multi-file answer is correct when behavior is per-backend by design (base/operations.py defines the default, each vendor's operations.py overrides it).", "pre": {}, "tests": [], "consumed": [], "incited_by": null, "reversibility": "pure", "index_keys": {"precondition_shape": [], "action_type": "dossier", "domain": ["django__django-13121"], "test_ids": []}, "success": {}, "credit": {"total": 0.0, "n_events": 0, "by_source": {}}, "ref": "main"}, "10e5905f2fed9861325079c4bf0e3532f82a0b29": {"sha": "10e5905f2fed9861325079c4bf0e3532f82a0b29", "kind": "knowledge", "path": "knowledge/model-string-references.md", "actor": "librarian", "ts": 1783165326.1506698, "action": "capture_dossier", "args": {"issue": "django__django-13112"}, "reasoning": "# Model string references (\"app_label.ModelName\") \u2014 case-sensitivity and where they live\n\n- Relational fields store lazy references to models as strings of the form `app_label.ModelName`. App labels ARE case-sensitive (mixed-case app labels like `DJ_RegLogin` are legal); only the model-name half may be lowercased for normalization. Lowercasing the whole string (e.g. `self.remote_field.model.lower()`) silently breaks apps with mixed-case labels \u2014 the app registry then reports the (lowercased) app as \"not installed\" during makemigrations/migrate.\n- Key construction point: `ForeignObject.deconstruct()` in `django/db/models/fields/related.py` (~line 584) builds the string form of `to` for migrations. This is where reference-normalization bugs originate.\n- Downstream consumers of these strings (they resolve, not create, references \u2014 usually NOT where the fix belongs): `django/db/migrations/state.py`, `django/db/migrations/autodetector.py`, `django/db/migrations/operations/utils.py` (resolve_relation), `django/db/models/options.py`, and the app registry's lazy-reference check that raises `ValueError: ... was declared with a lazy reference to ... but app ... isn't installed`.\n\n## Localization lesson\nFor bugs where a model/app reference string comes out wrong, fix the single point where the string is CONSTRUCTED (deconstruct/serialization), not the many places it is consumed. Real fix for the mixed-case app-label makemigrations crash touched only `django/db/models/fields/related.py`; the agent's 5-file candidate list (autodetector, state, options, operations/utils) was 4 files too wide.", "pre": {}, "tests": [], "consumed": [], "incited_by": null, "reversibility": "pure", "index_keys": {"precondition_shape": [], "action_type": "dossier", "domain": ["django__django-13112"], "test_ids": []}, "success": {}, "credit": {"total": 0.0, "n_events": 0, "by_source": {}}, "ref": "main"}}, "commits": {"main": [{"sha": "0233939fef3c102fa935a1dcb68243b606b510fa", "summary": "knowledge: capture_dossier", "path": "knowledge/group-by-expression-contract.md"}, {"sha": "0de06a4e7a663f505f42a70b4d95461144a725b4", "summary": "knowledge: revise_dossier", "path": "knowledge/durationfield-backend-emulation.md"}, {"sha": "1e9daf56f46586434287c5fe81863709fc4047e3", "summary": "knowledge: capture_dossier", "path": "knowledge/sqlite-numeric-mixin-cast-placement.md"}, {"sha": "34f5badf0ee0531bf4bf7f606f40cc1cad14f36e", "summary": "knowledge: capture_dossier", "path": "knowledge/queryset-introspection-mirrors-compiler.md"}, {"sha": "823cc57de93117b538f2c46ccfff41f92d3cfc4c", "summary": "knowledge: capture_dossier", "path": "knowledge/queryset-vs-query-state-split.md"}, {"sha": "ef4e9de7c5681921f585582425afefc5fc3600f8", "summary": "knowledge: capture_dossier", "path": "knowledge/field-ident 17b538f2c46ccfff41f92d3cfc4c", "main::knowledge/field-identity-creation-counter.md": "ef4e9de7c5681921f585582425afefc5fc3600f8", "main::knowledge/datetime-functions-timezone-mixin.md": "438d4db1e875287877610cc9dc0d76404a3192c0", "main::knowledge/jsonfield-key-transform-lookups.md": "f4a0ab3e51b808d0d29543599fc938c25417a833", "main::knowledge/field-deconstruction-callables.md": "84d8e1c93f38a648313eedceeb474ffcee5b6232", "main::knowledge/combined-query-compiler-bypass.md": "5906661e15ba3291264a901db8361920116a5bc5", "main::knowledge/expression-output-field-resolution.md": "1aa559ca171ff5afc7365bc11bc73ede3db4cfb2", "main::knowledge/model-string-references.md": "10e5905f2fed9861325079c4bf0e3532f82a0b29"}};
const gems = D.gems, pathSha = D.path_sha;
const refSel = document.getElementById('ref');
D.refs.forEach(r=>{const o=document.createElement('option');o.value=r.name;
  o.textContent=r.name+(r.name==='main'?'  (accepted reality)':'');refSel.appendChild(o);});
document.getElementById('stats').textContent =
  Object.keys(gems).length+' gems · '+(D.refs.length-1)+' alternate-reality branches';
function esc(s){return (s??'').toString().replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function treeHTML(nodes, ref){let h='';for(const n of nodes){
  if(n.gem){const sha=pathSha[ref+'::'+n.path]||'';
    h+=`<div style="margin-left:10px">◆ <span class="gem" onclick="show('${sha}')">${esc(n.name)}</span></div>`;}
  else if(n.name){h+=`<details open><summary>${esc(n.name)}/</summary>${treeHTML(n.children,ref)}</details>`;}
}return h;}
function renderRef(){const ref=refSel.value;const r=D.refs.find(x=>x.name===ref);
  document.getElementById('tree').innerHTML=treeHTML(r.tree,ref);
  const log=D.commits[ref]||[];
  document.getElementById('log').innerHTML=log.map(c=>
    `<div class="commit"><a onclick="show('${c.sha}')">${c.sha.slice(0,8)}</a> ${esc(c.summary)}</div>`).join('');}
refSel.onchange=renderRef; renderRef();
function fmtSuccess(s){return Object.entries(s).map(([k,v])=>
  `<span class="tag">${esc(k)}: ${v==='pending'?'⊥ pending':v}</span>`).join('')||'<span class="muted">none</span>';}
function show(sha){const g=gems[sha];if(!g)return;const cr=g.credit.total;
  const consumed=(g.consumed||[]).map(s=>{const t=gems[s];
    return `<div>↳ <a onclick="show('${s}')">${s.slice(0,10)}</a> <span class="muted">${t?esc(t.path):'(external)'}</span></div>`}).join('')||'<span class="muted">none</span>';
  document.getElementById('main').innerHTML=`
   <h1>${esc(g.path||'(no path)')} <span class="muted">· ${esc(g.kind)} · ${esc(g.ref)}</span></h1>
   <div><span class="tag">actor ${esc(g.actor)}</span><span class="tag">action ${esc(g.action)}</span>
    <span class="tag">reversibility ${esc(g.reversibility)}</span>
    ${g.tests.map(t=>`<span class="tag">test ${esc(t)}</span>`).join('')}</div>
   <div class="sec">reasoning.md</div><pre>${esc(g.reasoning)||'<empty>'}</pre>
   <div class="sec">valuation (append-only notes)</div>
   <table><tr><td>success</td><td>${fmtSuccess(g.success)}</td></tr>
   <tr><td>credit</td><td class="${cr>=0?'credit-pos':'credit-neg'}">${cr.toFixed(3)}
     <span class="muted">(${g.credit.n_events} events)</span></td></tr></table>
   <div class="sec">evidence consumed (the why)</div>${consumed}
   ${g.incited_by?`<div class="sec">incited by</div><a onclick="show('${g.incited_by}')">${g.incited_by.slice(0,10)}</a>`:''}
   <div class="sec">pre / args</div><pre>${esc(JSON.stringify({pre:g.pre,args:g.args},null,1))}</pre>
   <div class="sec">commit</div><div class="muted">${g.sha}</div>`;
  window.scrollTo(0,0);}
document.getElementById('q').oninput=e=>{const q=e.target.value.toLowerCase();
  if(!q){renderRef();return;}
  const hits=Object.values(gems).filter(g=>(g.reasoning+g.path).toLowerCase().includes(q)).slice(0,80);
  document.getElementById('tree').innerHTML=hits.map(g=>
   `<div>◆ <span class="gem" onclick="show('${g.sha}')">${esc(g.path)}</span>
     <span class="muted">${esc(g.ref)}</span></div>`).join('')||'<div class="muted">no hits</div>';};
</script></body></html>
